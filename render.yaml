services:
  # Backend server
  - type: web
    name: chattr-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: CLIENT_URL
        fromService:
          name: chattr-client
          type: web
          property: host

  # Frontend static site
  - type: web
    name: chattr-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        fromService:
          name: chattr-server
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
